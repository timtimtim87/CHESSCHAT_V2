name: Deploy Main to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_SERVICE_NAME: ${{ vars.ECS_SERVICE_NAME }}
      ECS_CONTAINER_NAME: app
      ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      STATIC_SITE_BUCKET: ${{ vars.STATIC_SITE_BUCKET }}
      STATIC_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.STATIC_CLOUDFRONT_DISTRIBUTION_ID }}
      COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
      COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
      COGNITO_HOSTED_UI_BASE_URL: ${{ vars.COGNITO_HOSTED_UI_BASE_URL }}
      APP_HOST: ${{ vars.APP_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        run: |
          set -euo pipefail
          test -n "${ECR_REPOSITORY_URL}"
          IMAGE_SHA_URI="${ECR_REPOSITORY_URL}:${GITHUB_SHA}"
          IMAGE_LATEST_URI="${ECR_REPOSITORY_URL}:main-latest"
          docker build -f app/backend/Dockerfile -t "${IMAGE_SHA_URI}" -t "${IMAGE_LATEST_URI}" .
          docker push "${IMAGE_SHA_URI}"
          docker push "${IMAGE_LATEST_URI}"
          echo "IMAGE_SHA_URI=${IMAGE_SHA_URI}" >> "$GITHUB_ENV"

      - name: Publish static auth site
        run: |
          set -euo pipefail
          test -n "${STATIC_SITE_BUCKET}"
          test -n "${STATIC_CLOUDFRONT_DISTRIBUTION_ID}"
          test -n "${COGNITO_CLIENT_ID}"
          test -n "${COGNITO_HOSTED_UI_BASE_URL}"
          test -n "${APP_HOST}"

          cat > app/static-auth/config.js <<EOF
          window.__CHESSCHAT_AUTH_CONFIG__ = {
            region: "${AWS_REGION}",
            userPoolId: "${COGNITO_USER_POOL_ID}",
            clientId: "${COGNITO_CLIENT_ID}",
            hostedUiBaseUrl: "${COGNITO_HOSTED_UI_BASE_URL}",
            appHost: "${APP_HOST}",
            pendingRoomCookieName: "cc_pending_room",
            pendingRoomMaxAgeSeconds: 600,
            sessionCookieName: "cc_session",
            sessionMaxAgeSeconds: 3600
          };
          EOF

          aws s3 sync app/static-auth/ "s3://${STATIC_SITE_BUCKET}/" \
            --delete \
            --cache-control "public,max-age=300,s-maxage=300" \
            --exclude "config.js"

          aws s3 cp app/static-auth/config.js "s3://${STATIC_SITE_BUCKET}/config.js" \
            --cache-control "no-store"

          aws cloudfront create-invalidation \
            --distribution-id "${STATIC_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*" >/dev/null

      - name: Register task definition revision
        run: |
          set -euo pipefail
          test -n "${ECS_TASK_FAMILY}"

          LATEST_TASK_DEF_ARN="$(aws ecs list-task-definitions \
            --family-prefix "${ECS_TASK_FAMILY}" \
            --status ACTIVE \
            --sort DESC \
            --query 'taskDefinitionArns[0]' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "${LATEST_TASK_DEF_ARN}" \
            --query 'taskDefinition' \
            --output json > task-definition.json

          jq --arg IMAGE_URI "${IMAGE_SHA_URI}" --arg CONTAINER_NAME "${ECS_CONTAINER_NAME}" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions = (
              .containerDefinitions
              | map(if .name == $CONTAINER_NAME then .image = $IMAGE_URI else . end)
            )
          ' task-definition.json > task-definition-updated.json

          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-definition-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          echo "NEW_TASK_DEF_ARN=${NEW_TASK_DEF_ARN}" >> "$GITHUB_ENV"

      - name: Deploy ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${ECS_SERVICE_NAME}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --force-new-deployment >/dev/null

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_SERVICE_NAME}"

      - name: Capture deployment metadata
        run: |
          set -euo pipefail
          IMAGE_DIGEST="$(aws ecr describe-images \
            --repository-name "$(echo "${ECR_REPOSITORY_URL}" | awk -F'/' '{print $2}')" \
            --image-ids imageTag="${GITHUB_SHA}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"

          cat > deploy-metadata.json <<EOF
          {
            "commit_sha": "${GITHUB_SHA}",
            "image_uri": "${IMAGE_SHA_URI}",
            "image_digest": "${IMAGE_DIGEST}",
            "ecs_cluster_name": "${ECS_CLUSTER_NAME}",
            "ecs_service_name": "${ECS_SERVICE_NAME}",
            "task_definition_arn": "${NEW_TASK_DEF_ARN}"
          }
          EOF

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-metadata
          path: |
            deploy-metadata.json
            task-definition-updated.json
